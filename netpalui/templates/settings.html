{% extends "base.html" %}
{% block title %}Settings | NetPal{% endblock %}
{% block content %}
<section class="card">
    <div class="tab-row">
        {% for settings_file in settings_files %}
        <a href="{{ url_for('settings_page', file=settings_file) }}" class="tab-link{% if settings_file == filename %} is-active{% endif %}">{{ settings_file }}</a>
        {% endfor %}
    </div>
    <form action="{{ url_for('settings_page') }}" method="post">
        <input type="hidden" name="filename" value="{{ filename }}">
        <label class="field">
            <span>{{ filename }}</span>
            <textarea class="textarea editor-textarea" name="content" rows="28" spellcheck="false">{{ editor_text }}</textarea>
        </label>
        <div class="button-row">
            <button class="button" type="submit">Save {{ filename }}</button>
        </div>
    </form>
</section>
{% endblock %}
