- name: IMAP Capabilities
  description: Enumerate IMAP capabilities
  ports:
  - 143
  - 993
  service_names:
  - imap
  - imaps
  command: nmap -p {port} --script imap-capabilities {ip}
  auto_run: true
- name: BloodHound CE Python
  description: Run BloodHound CE Python collector with credential brute force
  ports:
  - 389
  - 636
  - 3268
  service_names:
  - ldap
  - ldaps
  command: bloodhound-ce-python -ns {ip} -u '{username}' -p '{password}' -d '{domain}'
    -c all
  auto_run: false
- name: SMB Credential Test
  description: Test SMB credentials with NetExec
  ports:
  - 139
  - 445
  service_names:
  - netbios-ssn
  - microsoft-ds
  - smb
  command: netexec smb {ip} -u '{username}' -p '{password}' --shares
  auto_run: false
