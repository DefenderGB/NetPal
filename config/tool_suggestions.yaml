- name: PostgreSQL Info
  description: Gather PostgreSQL database information
  ports:
  - 5432
  service_names:
  - postgresql
  command: nmap -p {port} --script pgsql-brute {ip}
  auto_run: false
- name: Oracle TNS Version
  description: Detect Oracle TNS listener version
  ports:
  - 1521
  - 1522
  service_names:
