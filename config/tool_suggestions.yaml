tools:
- name: SMB Enumeration
  description: Enumerate SMB shares
  ports:
  - 139
  - 445
  service_names:
  - netbios-ssn
  - microsoft-ds
  - smb
  command: netexec smb {ip} --shares
  auto_run: true
- name: FTP Anonymous Login
  description: Test FTP anonymous login
  command: nmap -p {port} --script ftp-anon {ip}
  ports:
  - 21
  service_names:
  - ftp
  auto_run: true
- name: SSH Version Detection
  description: Detect SSH version and algorithms
  command: nmap -p {port} --script ssh2-enum-algos {ip}
  ports:
  - 22
  service_names:
  - ssh
  auto_run: true
- name: Nikto Scan
  description: Run Nikto web scanner
  command: nikto -h {protocol}://{ip}:{port}
  ports:
  - 80
  - 443
  - 4443
  - 8080
  - 8443
  - 8000
  service_names:
  - http
  - http-proxy
  - https
  - ssl/http
  auto_run: false
- name: MySQL Enumeration
  description: Enumerate MySQL information
  command: nmap -p {port} --script mysql-info {ip}
  ports:
  - 3306
  service_names:
  - mysql
  auto_run: true
- name: MSSQL Enumeration
  description: Enumerate MSSQL information
  command: nmap -p {port} --script ms-sql-info {ip}
  ports:
  - 1433
  service_names:
  - ms-sql-s
  - mssql
  auto_run: true
- name: RDP Security Check
  description: Check RDP security settings
  command: nmap -p {port} --script rdp-enum-encryption {ip}
  ports:
  - 3389
  service_names:
  - ms-wbt-server
  - rdp
  auto_run: true
- name: SNMP Enumeration
  description: Enumerate SNMP information
  ports:
  - 161
  service_names:
  - snmp
  command: snmpwalk -v 2c -c public {ip}
  auto_run: false
- name: LDAP Enumeration
  description: Enumerate LDAP information
  ports:
  - 389
  - 636
  service_names:
  - ldap
  - ldaps
  command: nmap -p {port} --script ldap-search {ip}
  auto_run: false
- name: Redis Enumeration
  description: Enumerate Redis information
  command: nmap -p {port} --script redis-info {ip}
  ports:
  - 6379
  service_names:
  - redis
  auto_run: true
- name: MongoDB Enumeration
  description: Enumerate MongoDB information
  command: nmap -p {port} --script mongodb-info {ip}
  ports:
  - 27017
  service_names:
  - mongodb
  auto_run: true
- name: DNS Zone Transfer
  description: Attempt DNS zone transfer
  ports:
  - 53
  service_names:
  - domain
  - dns
  command: dig axfr @{ip}
  auto_run: false
- name: Telnet Banner Grab
  description: Grab Telnet banner
  command: nmap -p {port} --script banner {ip}
  ports:
  - 23
  service_names:
  - telnet
  auto_run: true
- name: HTTPX Screenshot
  description: Take screenshot of web service
  command: httpx -u {protocol}://{ip}:{port} -screenshot -srd {srd} -disable-update-check -ho '--no-sandbox'
  ports:
  - 80
  - 443
  - 7443
  - 8080
  - 8443
  - 8000
  - 4443
  service_names:
  - http
  - https
  - ssl/http
  - http-proxy
  - vnc-http
  - ccproxy-http
  - http-rpc-epmap
  - soap-http
  - http-alt
  auto_run: true
- name: SMB Signing Check
  description: Check if SMB signing is enabled/required
  ports:
  - 139
  - 445
  service_names:
  - netbios-ssn
  - microsoft-ds
  - smb
  command: nmap -p {port} --script smb-security-mode,smb2-security-mode {ip}
  auto_run: true
- name: SMB Vulnerability Scan
  description: Scan for common SMB vulnerabilities (EternalBlue, etc.)
  ports:
  - 139
  - 445
  service_names:
  - netbios-ssn
  - microsoft-ds
  - smb
  command: nmap -p {port} --script smb-vuln* {ip}
  auto_run: true
- name: NetBIOS Enumeration
  description: Enumerate NetBIOS information
  ports:
  - 137
  - 138
  - 139
  service_names:
  - netbios-ns
  - netbios-dgm
  - netbios-ssn
  command: nbtscan {ip}
  auto_run: true
- name: iSCSI Discovery
  description: Discover iSCSI targets
  ports:
  - 3260
  service_names:
  - iscsi
  command: nmap -p {port} --script iscsi-info {ip}
  auto_run: true
- name: VNC Authentication Check
  description: Check VNC authentication methods
  ports:
  - 5900
  - 5901
  - 5902
  service_names:
  - vnc
  - vnc-http
  command: nmap -p {port} --script vnc-info,realvnc-auth-bypass {ip}
  auto_run: true
- name: RPC Enumeration
  description: Enumerate RPC services
  ports:
  - 111
  - 135
  service_names:
  - rpcbind
  - msrpc
  command: nmap -p {port} --script rpcinfo {ip}
  auto_run: true
- name: NFS Share Enumeration
  description: Enumerate NFS shares
  ports:
  - 2049
  service_names:
  - nfs
  command: nmap -p {port} --script nfs-ls,nfs-showmount,nfs-statfs {ip}
  auto_run: true
- name: SNMP Community String Brute Force
  description: Brute force SNMP community strings
  ports:
  - 161
  service_names:
  - snmp
  command: nmap -p {port} --script snmp-brute {ip}
  auto_run: false
- name: SNMP System Info
  description: Extract system information via SNMP
  ports:
  - 161
  service_names:
  - snmp
  command: nmap -p {port} --script snmp-sysdescr,snmp-processes,snmp-netstat {ip}
  auto_run: false
- name: Cisco Smart Install Exploit Check
  description: Check for Cisco Smart Install vulnerability
  ports:
  - 4786
  service_names:
  - smart-install
  command: nmap -p {port} --script cisco-smart-install {ip}
  auto_run: true
- name: SSH Weak Algorithms
  description: Detect weak SSH algorithms and ciphers
  ports:
  - 22
  service_names:
  - ssh
  command: nmap -p {port} --script ssh-auth-methods,ssh2-enum-algos {ip}
  auto_run: true
- name: SSH Brute Force Check
  description: Test SSH for brute force protection
  ports:
  - 22
  service_names:
  - ssh
  command: nmap -p {port} --script ssh-brute --script-args userdb=users.txt,passdb=pass.txt,brute.firstonly=true
    {ip}
  auto_run: false
- name: RDP NLA Check
  description: Check if RDP has Network Level Authentication enabled
  ports:
  - 3389
  service_names:
  - ms-wbt-server
  - rdp
  command: nmap -p {port} --script rdp-ntlm-info {ip}
  auto_run: true
- name: RDP Vulnerability Scan
  description: Scan for RDP vulnerabilities (BlueKeep, etc.)
  ports:
  - 3389
  service_names:
  - ms-wbt-server
  - rdp
  command: nmap -p {port} --script rdp-vuln-ms12-020 {ip}
  auto_run: false
- name: FTP Bounce Attack
  description: Test for FTP bounce attack vulnerability
  ports:
  - 21
  service_names:
  - ftp
  command: nmap -p {port} --script ftp-bounce {ip}
  auto_run: false
- name: FTP Brute Force
  description: Brute force FTP credentials
  ports:
  - 21
  service_names:
  - ftp
  command: nmap -p {port} --script ftp-brute {ip}
  auto_run: false
- name: Telnet Encryption Check
  description: Check if Telnet supports encryption
  ports:
  - 23
  service_names:
  - telnet
  command: nmap -p {port} --script telnet-encryption {ip}
  auto_run: true
- name: Telnet Brute Force
  description: Brute force Telnet credentials
  ports:
  - 23
  service_names:
  - telnet
  command: nmap -p {port} --script telnet-brute {ip}
  auto_run: false
- name: LDAP Anonymous Bind
  description: Test for LDAP anonymous bind
  ports:
  - 389
  - 636
  service_names:
  - ldap
  - ldaps
  command: nmap -p {port} --script ldap-rootdse {ip}
  auto_run: false
- name: DNS Service Discovery
  description: Enumerate DNS service records
  ports:
  - 53
  service_names:
  - domain
  - dns
  command: nmap -p {port} --script dns-service-discovery {ip}
  auto_run: false
- name: DNS Recursion Check
  description: Check if DNS allows recursive queries
  ports:
  - 53
  service_names:
  - domain
  - dns
  command: nmap -p {port} --script dns-recursion {ip}
  auto_run: false
- name: IPMI Version Detection
  description: Detect IPMI version and cipher suites
  ports:
  - 623
  service_names:
  - ipmi
  - asf-rmcp
  command: nmap -p {port} -sU --script ipmi-version,ipmi-cipher-zero {ip}
  auto_run: true
- name: Printer JetDirect Info
  description: Extract information from HP JetDirect printers
